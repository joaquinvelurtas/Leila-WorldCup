<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard Mundial 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:             #080c18;
    --col-bg:         #0e1220;
    --card-bg:        #131829;
    --card-hover:     #181e30;
    --text-primary:   #eef0f8;
    --text-secondary: #7a819e;
    --text-muted:     #4a5170;
    --border:         #1e2438;
    --border-hover:   #2e3555;
    --arrow-color:    #3fb87a;
    --radius:         14px;
    --radius-sm:      10px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    height: 100vh;
    overflow: hidden;
    color: var(--text-primary);
  }

  /* ── Slide system ─────────────────────────────────────────── */
  .slide {
    position: fixed;
    inset: 0;
    bottom: 50px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.8s ease;
    display: flex;
    flex-direction: column;
    padding: 24px 24px 0;
    background: var(--bg);
  }
  .slide.active { opacity: 1; pointer-events: all; }

  /* ── Slide 2: Twitter dashboard ──────────────────────────── */
  #slide-2 { padding: 24px 24px 0; }

  /* ── Slide 3: Bubble chart + right panel ─────────────────── */
  #slide-3 {
    padding: 20px 24px 0;
    flex-direction: row;
    gap: 14px;
  }

  /* ── Dashboard grid (slides 1 & 2) ───────────────────────── */
  .dashboard {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    max-width: 1400px;
    width: 100%;
    margin: 0 auto;
    height: 100%;
  }
  .column {
    background: var(--col-bg);
    border-radius: var(--radius);
    padding: 18px 14px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    border: 1px solid var(--border);
    height: 100%;
    overflow: hidden;
  }
  .column-title {
    font-family: 'Syne', sans-serif;
    font-size: 17px;
    font-weight: 800;
    color: var(--text-primary);
    text-align: center;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
    letter-spacing: -0.2px;
    flex-shrink: 0;
    height: 2.8em;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1.25;
  }

  /* ── News card ────────────────────────────────────────────── */
  .card {
    background: var(--card-bg);
    border-radius: var(--radius-sm);
    padding: 15px 14px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    flex: 1;
    min-height: 0;
    border: 1px solid var(--border);
    transition: background 0.2s, border-color 0.2s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .card:hover { background: var(--card-hover); border-color: var(--border-hover); }
  .card.gold {
    background: linear-gradient(135deg, #1e1a0a 0%, #221e0d 40%, #1a1608 100%);
    border-color: #3a3010;
  }
  .card.gold:hover {
    background: linear-gradient(135deg, #252110 0%, #28230f 40%, #1e1a0a 100%);
    border-color: #4a3e18;
  }
  .card.gold::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 80px; height: 80px;
    background: radial-gradient(ellipse at top left, rgba(201,168,76,0.15) 0%, transparent 70%);
    pointer-events: none;
  }
  .card-top { display: flex; flex-direction: column; gap: 8px; }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: 13.5px;
    font-weight: 700;
    line-height: 1.35;
    color: var(--text-primary);
    flex: 1;
  }
  .card.gold .card-title { color: #e8ca7a; }
  .arrow-wrap { flex-shrink: 0; margin-top: 1px; color: var(--arrow-color); }
  .card.gold .arrow-wrap { color: #c9a84c; }
  .card-summary {
    font-size: 11.5px;
    line-height: 1.55;
    color: var(--text-secondary);
    flex: 1;
    overflow: hidden;
  }
  .card-divider { height: 1px; background: var(--border); }
  .card.gold .card-divider { background: #3a3010; }
  .card-footer { display: flex; align-items: center; gap: 8px; }
  .medio-logo {
    width: 22px; height: 22px;
    border-radius: 4px; overflow: hidden;
    flex-shrink: 0; position: relative;
  }
  .medio-logo img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; }
  .medio-logo .initials {
    display: none;
    position: absolute; inset: 0;
    align-items: center; justify-content: center;
    font-size: 7px; font-weight: 800; color: #fff;
    border-radius: 4px; letter-spacing: -0.3px;
  }
  .medio-name { font-size: 11px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.2px; }

  /* ── Twitter card extras ──────────────────────────────────── */
  .x-logo-wrap {
    width: 22px; height: 22px;
    border-radius: 4px;
    background: #000;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: #fff;
  }
  .tweet-text {
    font-size: 11.5px;
    line-height: 1.5;
    color: var(--text-primary);
    font-weight: 500;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
  }
  .card.gold .tweet-text { color: #f0dfa0; }
  .tweet-desc {
    font-size: 11px;
    line-height: 1.5;
    color: var(--text-secondary);
    flex: 1;
    overflow: hidden;
  }
  .tweet-metrics {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 8px;
  }
  .metric {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 10.5px;
    font-weight: 600;
    color: var(--text-muted);
  }
  .metric svg { flex-shrink: 0; }

  /* ── Slide 3 left: Bubble chart shell ────────────────────── */
  .chart-shell {
    flex: 0 0 37.5%;
    max-width: 37.5%;
    overflow: hidden;
    min-width: 0;
    height: 100%;
    display: flex;
    flex-direction: column;
    background: var(--col-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 20px 14px;
  }
  .chart-body {
    flex: 1;
    min-height: 0;
    position: relative;
  }
  #bubbleCanvas { position: absolute; inset: 0; display: block; }

  /* ── Slide 3 right: Pulse panel ──────────────────────────── */
  .slide2-right {
    flex: 1;
    min-width: 0;
    height: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .pulse-card {
    background: var(--col-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
  }
  .pulse-header {
    display: flex; align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .pulse-title { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 800; color: var(--text-primary); }
  .pulse-subtitle { font-size: 11px; color: var(--text-muted); font-weight: 500; }
  .trend-row {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 0;
    border-bottom: 1px solid rgba(30,36,56,0.6);
  }
  .trend-row:last-child { border-bottom: none; }
  .trend-rank { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 800; color: var(--text-muted); width: 16px; flex-shrink: 0; text-align: center; }
  .trend-name { font-size: 12px; font-weight: 600; color: var(--text-primary); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .trend-bar-wrap { width: 80px; height: 4px; background: rgba(30,36,56,0.8); border-radius: 2px; overflow: hidden; flex-shrink: 0; }
  .trend-bar { height: 100%; border-radius: 2px; }
  .trend-vol { font-size: 11px; color: var(--text-secondary); width: 42px; text-align: right; flex-shrink: 0; }
  .trend-sentiment { width: 28px; height: 16px; border-radius: 3px; font-size: 9px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .sent-pos { background: rgba(63,184,122,0.18); color: #3fb87a; }
  .sent-neu { background: rgba(74,81,112,0.25); color: #7a819e; }
  .sent-neg { background: rgba(224,72,72,0.18); color: #e04848; }
  .spark-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .spark-item { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px 8px; }
  .spark-label { font-size: 10px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 4px; }
  .spark-value { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; color: var(--text-primary); line-height: 1; margin-bottom: 6px; }
  .spark-delta { font-size: 10px; font-weight: 600; }
  .delta-up { color: #3fb87a; }
  .delta-down { color: #e04848; }
  .spark-canvas { width: 100%; height: 32px; display: block; }
  .tag-cloud { display: flex; flex-wrap: wrap; gap: 7px; align-items: center; }
  .tag { border-radius: 4px; font-weight: 600; line-height: 1; padding: 4px 9px; cursor: default; transition: opacity 0.15s; }
  .tag:hover { opacity: 0.75; }

  /* ── Footer bar ───────────────────────────────────────────── */
  .bottom-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 50px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    z-index: 100;
  }
  .bottom-label { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; color: var(--text-muted); }
  .bottom-pill {
    background: var(--col-bg); border: 1px solid var(--border);
    border-radius: 20px; padding: 6px 16px;
    font-size: 12.5px; font-weight: 600; color: var(--text-secondary);
    display: flex; align-items: center; gap: 7px;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #c9a84c; }
</style>
</head>

// ── Logo with fallback initials ───────────────────────────────
function buildLogoHTML(medio) {
  const src = LOGOS[medio] || "";
  const bg  = MEDIO_COLORS[medio]   || "#333";
  const ini = MEDIO_INITIALS[medio] || medio.slice(0,2).toUpperCase();
  return '<div class="medio-logo">'
    + '<img src="' + src + '" alt="' + medio + '"'
    + ' onload="this.style.display=\'block\';this.parentElement.querySelector(\'.initials\').style.display=\'none\';"'
    + ' onerror="this.style.display=\'none\';this.parentElement.querySelector(\'.initials\').style.display=\'flex\';"'
    + ' style="display:block"/>'
    + '<div class="initials" style="background:' + bg + ';">' + ini + '</div>'
    + '</div>';
}

// ── Build portales card ───────────────────────────────────────
function buildCard(item) {
  const gc = item.gold ? " gold" : "";
  return '<div class="card' + gc + '">'
    + '<div class="card-top"><div class="card-header">'
    + '<div class="card-title">' + item.titulo_corto + '</div>'
    + '<div class="arrow-wrap">' + arrowSVG + '</div>'
    + '</div><p class="card-summary">' + item.resumen + '</p></div>'
    + '<div><div class="card-divider" style="margin-bottom:10px;"></div>'
    + '<div class="card-footer">' + buildLogoHTML(item.medio)
    + '<span class="medio-name">' + item.medio + '</span></div></div></div>';
}

// ── Extract @handle ───────────────────────────────────────────
function extractHandle(autor) {
  const m = autor.match(/@(\S+?)\)?$/);
  return m ? '@' + m[1].replace(/[)]/g, '') : autor;
}

function fmtNum(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1) + "M";
  if (n >= 1000)    return (n/1000).toFixed(1).replace('.0','') + "K";
  return String(n);
}

// ── Build Twitter card ────────────────────────────────────────
function buildTwitterCard(item) {
  const gc = item.gold ? " gold" : "";
  const handle = extractHandle(item.autor || item.Autor || "");
  const texto  = (item.texto  || item.Texto  || "").replace(/\n/g, ' ');
  const desc   = item.descripción || item.Descripción || "";
  const likes   = item.likes   !== undefined ? item.likes   : (item.Likes   || 0);
  const reposts = item.reposts !== undefined ? item.reposts : (item.Reposts || 0);
  const replies = item.replies !== undefined ? item.replies : (item.Replies || 0);
  return '<div class="card' + gc + '">'
    + '<div class="card-top" style="gap:6px;">'
    + '<div class="tweet-text">' + texto + '</div>'
    + '<p class="tweet-desc">' + desc + '</p>'
    + '</div>'
    + '<div>'
    + '<div class="tweet-metrics">'
    + '<span class="metric">' + likeIcon + ' ' + fmtNum(likes)   + '</span>'
    + '<span class="metric">' + rtIcon   + ' ' + fmtNum(reposts) + '</span>'
    + '<span class="metric">' + repIcon  + ' ' + fmtNum(replies) + '</span>'
    + '</div>'
    + '<div class="card-divider" style="margin-bottom:8px;"></div>'
    + '<div class="card-footer">'
    + '<div class="x-logo-wrap">' + X_ICON + '</div>'
    + '<span class="medio-name">' + handle + '</span>'
    + '</div></div></div>';
}

// ── Render dashboard (generic) ────────────────────────────────
function renderDashboard(data, targetId, cardFn) {
  const presentPillars = PILLARS.filter(p => data.some(d => (d.pilar || d.Pilar) === p));
  const el = document.getElementById(targetId);
  if (!el) return;
  el.innerHTML = "";
  el.style.gridTemplateColumns = "repeat(" + presentPillars.length + ", 1fr)";
  presentPillars.forEach(pilar => {
    const items = data.filter(d => (d.pilar || d.Pilar) === pilar);
    const col   = document.createElement("div");
    col.className = "column";
    col.innerHTML = '<div class="column-title">' + pilar + '</div>' + items.map(cardFn).join("");
    el.appendChild(col);
  });
}

// ── Bubble chart ──────────────────────────────────────────────
function renderBubbleChart(raw) {
  // Support both formats: new {tema,engagement,views,volumen} and old {tema,likes,reposts,views,replies}
  const data = raw.map(d => ({
    ...d,
    engagement: d.engagement !== undefined ? d.engagement : ((d.likes || 0) + (d.reposts || 0)),
    volumen:    d.volumen    !== undefined ? d.volumen    : (d.replies || 0),
    isMessi: d.tema.toLowerCase().includes("messi")
  }));
  const canvas = document.getElementById("bubbleCanvas");
  if (!canvas) return;
  const body  = canvas.parentElement;
  const DPR   = window.devicePixelRatio || 1;
  const W_CSS = body.clientWidth;
  const H_CSS = body.clientHeight;
  canvas.width  = W_CSS * DPR;
  canvas.height = H_CSS * DPR;
  canvas.style.width  = W_CSS + "px";
  canvas.style.height = H_CSS + "px";
  const ctx = canvas.getContext("2d");
  ctx.scale(DPR, DPR);
  const W = W_CSS, H = H_CSS;
  const PAD = { top: 20, right: 80, bottom: 36, left: 36 };
  const plotW = W - PAD.left - PAD.right;
  const plotH = H - PAD.top  - PAD.bottom;
  const maxEng     = Math.max(...data.map(d => d.engagement));
  const maxViews   = Math.max(...data.map(d => d.views));
  const maxVol = Math.max(...data.map(d => d.volumen));
  const minVol = Math.min(...data.map(d => d.volumen));
  const axisMaxEng   = maxEng   * 1.5;
  const axisMaxViews = maxViews * 1.15;
  const scaleX = v => PAD.left + (Math.sqrt(v) / Math.sqrt(axisMaxEng))   * plotW;
  const scaleY = v => PAD.top  + (1 - Math.sqrt(v)/Math.sqrt(axisMaxViews)) * plotH;
  const scaleR = v => { const t = (v - minVol)/(maxVol - minVol || 1); return 10 + t*40; };
  const clampX = (cx, r) => Math.max(cx, PAD.left + r);
  const clampY = (cy, r) => Math.min(Math.max(cy, PAD.top + r), PAD.top + plotH - r);
  // Axis lines (dashed)
  ctx.strokeStyle = "rgba(90,105,148,0.7)";
  ctx.lineWidth   = 1.5;
  ctx.setLineDash([5, 5]);
  ctx.beginPath(); ctx.moveTo(PAD.left, PAD.top); ctx.lineTo(PAD.left, PAD.top + plotH); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(PAD.left, PAD.top + plotH); ctx.lineTo(PAD.left + plotW, PAD.top + plotH); ctx.stroke();
  ctx.setLineDash([]);
  // Axis labels
  ctx.fillStyle    = "rgba(238,240,248,0.75)";
  ctx.font         = "600 10px 'DM Sans', sans-serif";
  ctx.textBaseline = "middle";
  ctx.textAlign    = "center";
  ctx.fillText("Engagement (likes + reposts)", PAD.left + plotW / 2, PAD.top + plotH + 20);
  ctx.save();
  ctx.translate(PAD.left - 24, PAD.top + plotH / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.textAlign = "center";
  ctx.fillText("Views (total)", 0, 0);
  ctx.restore();
  // Bubbles
  const sorted = [...data].sort((a, b) => +a.isMessi - +b.isMessi);
  sorted.forEach(d => {
    const r  = scaleR(d.volumen);
    const x  = clampX(scaleX(d.engagement), r);
    const y  = clampY(scaleY(d.views), r);
    const lg = ctx.createLinearGradient(x - r, y, x + r, y);
    if (d.isMessi) { lg.addColorStop(0, "rgba(215,178,70,0.88)"); lg.addColorStop(1, "rgba(201,168,76,0.78)"); }
    else           { lg.addColorStop(0, "rgba(56,78,155,0.85)");  lg.addColorStop(1, "rgba(42,62,130,0.75)");  }
    ctx.fillStyle   = lg;
    ctx.strokeStyle = d.isMessi ? "rgba(201,168,76,0.5)" : "rgba(60,85,160,0.4)";
    ctx.lineWidth   = 1;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  });
  // Labels
  sorted.forEach(d => {
    const r  = scaleR(d.volumen);
    const x  = clampX(scaleX(d.engagement), r);
    const y  = clampY(scaleY(d.views), r);
    const fs = Math.max(9, Math.min(12, r * 0.28));
    ctx.font = "600 " + fs + "px 'DM Sans', sans-serif";
    ctx.textBaseline = "middle";
    const tw = ctx.measureText(d.tema).width;
    let lx, align;
    if (x + r + 6 + tw < PAD.left + plotW) { lx = x + r + 6; align = "left"; }
    else if (x - r - 6 - tw > PAD.left)    { lx = x - r - 6; align = "right"; }
    else                                    { lx = x;          align = "center"; }
    ctx.textAlign   = align;
    ctx.fillStyle   = d.isMessi ? "#e8ca7a" : "rgba(160,175,215,0.9)";
    ctx.shadowColor = "rgba(0,0,0,0.65)"; ctx.shadowBlur = 5;
    ctx.fillText(d.tema, lx, y);
    ctx.shadowBlur = 0;
  });
}

// ── Sparkline ─────────────────────────────────────────────────
function drawSparkline(canvas, vals, color) {
  const DPR = window.devicePixelRatio || 1;
  const W   = canvas.offsetWidth  || 120;
  const H   = canvas.offsetHeight || 32;
  canvas.width  = W * DPR; canvas.height = H * DPR;
  const ctx = canvas.getContext("2d"); ctx.scale(DPR, DPR);
  const max = Math.max(...vals), min = Math.min(...vals), pad = 3;
  const step = (W - pad*2) / (vals.length - 1);
  ctx.beginPath();
  vals.forEach((v, i) => {
    const x = pad + i*step;
    const y = H - pad - ((v-min)/(max-min||1))*(H-pad*2);
    i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.lineJoin = "round"; ctx.stroke();
}

function fmtVol(n) { if(n>=1000000) return (n/1000000).toFixed(1)+"M"; if(n>=1000) return Math.round(n/1000)+"K"; return String(n); }

// ── Right panel ───────────────────────────────────────────────
function renderRightPanel() {
  const container = document.getElementById("slide2-right");
  if (!container) return;
  const maxVol = TRENDING[0].vol;
  // Card 1: Trending
  const c1 = document.createElement("div");
  c1.className = "pulse-card"; c1.style.flex = "1";
  c1.innerHTML = '<div class="pulse-header"><span class="pulse-title">Trending topics</span><span class="pulse-subtitle">últimas 24h · Mundial 2026</span></div>'
    + TRENDING.map((t,i) => {
        const pct  = (t.vol/maxVol*100).toFixed(0);
        const sc   = t.sentiment==="pos"?"sent-pos":t.sentiment==="neg"?"sent-neg":"sent-neu";
        const sl   = t.sentiment==="pos"?"↑":t.sentiment==="neg"?"↓":"–";
        const barC = i<2?"#c9a84c":"#2e448c";
        return '<div class="trend-row"><span class="trend-rank">'+(i+1)+'</span><span class="trend-name">'+t.name+'</span>'
          +'<div class="trend-bar-wrap"><div class="trend-bar" style="width:'+pct+'%;background:'+barC+';"></div></div>'
          +'<span class="trend-vol">'+fmtVol(t.vol)+'</span><span class="trend-sentiment '+sc+'">'+sl+'</span></div>';
      }).join("");
  container.appendChild(c1);
  // Card 2: KPIs
  const c2 = document.createElement("div");
  c2.className = "pulse-card";
  c2.innerHTML = '<div class="pulse-header"><span class="pulse-title">Métricas en tiempo real</span><span class="pulse-subtitle">X · hoy</span></div><div class="spark-grid" id="spark-grid"></div>';
  container.appendChild(c2);
  const grid = c2.querySelector("#spark-grid");
  KPI.forEach(k => {
    const item = document.createElement("div"); item.className = "spark-item";
    const dc = k.up===true?"delta-up":k.up===false?"delta-down":"";
    const sc = k.up===false?"#e04848":k.up===null?"#c9a84c":"#3fb87a";
    item.innerHTML = '<div class="spark-label">'+k.label+'</div><div class="spark-value">'+k.value+'</div>'
      +'<div class="spark-delta '+dc+'" style="margin-bottom:4px;">'+k.delta+'</div>'
      +'<canvas class="spark-canvas" data-spark="'+k.spark.join(",")+'" data-color="'+sc+'"></canvas>';
    grid.appendChild(item);
  });
  // Card 3: Tags
  const c3 = document.createElement("div");
  c3.className = "pulse-card";
  c3.innerHTML = '<div class="pulse-header"><span class="pulse-title">Conversación activa</span><span class="pulse-subtitle">hashtags · keywords</span></div>'
    +'<div class="tag-cloud">'+TAGS.map(t=>'<span class="tag" style="font-size:'+t.size+'px;background:'+t.bg+';color:'+t.tc+';">'+t.text+'</span>').join("")+'</div>';
  container.appendChild(c3);
  requestAnimationFrame(() => {
    c2.querySelectorAll(".spark-canvas").forEach(c => {
      drawSparkline(c, c.dataset.spark.split(",").map(Number), c.dataset.color);
    });
  });
}

// ── Slide rotation ────────────────────────────────────────────
(function() {
  const slides = [
    document.getElementById("slide-1"),
    document.getElementById("slide-2"),
    document.getElementById("slide-3")
  ];
  let current       = 0;
  let bubbleRendered = false;
  setInterval(() => {
    slides[current].classList.remove("active");
    current = (current + 1) % slides.length;
    slides[current].classList.add("active");
    if (current === 2 && !bubbleRendered) {
      bubbleRendered = true;
      setTimeout(initBubble, 50);
    }
  }, SLIDE_INTERVAL_MS);
})();

// ── Boot ──────────────────────────────────────────────────────
