<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard Mundial 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c18;
    --col-bg: #0e1220;
    --card-bg: #131829;
    --card-hover: #181e30;
    --text-primary: #eef0f8;
    --text-secondary: #7a819e;
    --text-muted: #4a5170;
    --border: #1e2438;
    --border-hover: #2e3555;
    --arrow-color: #3fb87a;
    --radius: 14px;
    --radius-sm: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 24px 24px 58px;
    color: var(--text-primary);
    overflow: hidden;
  }

  .dashboard {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    max-width: 1400px;
    margin: 0 auto;
    flex: 1;
    min-height: 0;
  }

  .column {
    background: var(--col-bg);
    border-radius: var(--radius);
    padding: 18px 14px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    border: 1px solid var(--border);
    height: 100%;
    overflow: hidden;
  }

  .column-title {
    font-family: 'Syne', sans-serif;
    font-size: 17px;
    font-weight: 800;
    color: var(--text-primary);
    text-align: center;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
    letter-spacing: -0.2px;
  }

  /* Card base */
  .card {
    background: var(--card-bg);
    border-radius: var(--radius-sm);
    padding: 15px 14px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    flex: 1;
    min-height: 0;
    border: 1px solid var(--border);
    transition: background 0.2s, border-color 0.2s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .card:hover {
    background: var(--card-hover);
    border-color: var(--border-hover);
  }

  /* Gold card - subtle gradient like the original */
  .card.gold {
    background: linear-gradient(135deg, #1e1a0a 0%, #221e0d 40%, #1a1608 100%);
    border-color: #3a3010;
  }
  .card.gold:hover {
    background: linear-gradient(135deg, #252110 0%, #28230f 40%, #1e1a0a 100%);
    border-color: #4a3e18;
  }
  /* Subtle gold top-left corner accent */
  .card.gold::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 80px; height: 80px;
    background: radial-gradient(ellipse at top left, rgba(201,168,76,0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  .card-top { display: flex; flex-direction: column; gap: 8px; }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }

  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: 13.5px;
    font-weight: 700;
    line-height: 1.35;
    color: var(--text-primary);
    flex: 1;
  }
  .card.gold .card-title { color: #e8ca7a; }

  .arrow-wrap {
    flex-shrink: 0;
    margin-top: 1px;
    color: var(--arrow-color);
  }
  .card.gold .arrow-wrap { color: #c9a84c; }

  .card-summary {
    font-size: 11.5px;
    line-height: 1.55;
    color: var(--text-secondary);
    flex: 1;
    overflow: hidden;
  }

  .card-divider {
    height: 1px;
    background: var(--border);
  }
  .card.gold .card-divider { background: #3a3010; }

  .card-footer {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .medio-logo {
    width: 22px;
    height: 22px;
    border-radius: 4px;
    overflow: hidden;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .medio-logo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 4px;
  }

  .medio-name {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.2px;
  }

  /* Bottom bar */
  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--bg);
    z-index: 10;
    max-width: 1400px;

    height: 50px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 4px;
  }
  .bottom-label {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--text-muted);
  }
  .bottom-pill {
    background: var(--col-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #c9a84c; }
</style>
</head>
<body>

<div class="dashboard" id="dashboard"></div>

<div class="bottom-bar">
  <span class="bottom-label">Noticias Mundiales</span>
  <div class="bottom-pill"><span class="dot"></span>Mundial 2026</div>
  <span class="bottom-label" style="color:#c9a84c;">⚽ Dashboard</span>
</div>

const RAW_JSON = "https://raw.githubusercontent.com/joaquinvelurtas/Leila-WorldCup/main/posteos_mundial_2026_pilares.json";
const GOLD_KEYS = ["neymar", "hoteles", "nueva jersey"];

const arrowSVG = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none">
  <path d="M7 17L17 7M17 7H9M17 7V15" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>`;

function buildCard(item) {
  const goldClass = item.gold ? " gold" : "";
  const logoSrc = LOGOS[item.medio] || "";
  return `
    <div class="card${goldClass}">
      <div class="card-top">
        <div class="card-header">
          <div class="card-title">${item.titulo_corto}</div>
          <div class="arrow-wrap">${arrowSVG}</div>
        </div>
        <p class="card-summary">${item.resumen}</p>
      </div>
      <div>
        <div class="card-divider" style="margin-bottom:10px;"></div>
        <div class="card-footer">
          <div class="medio-logo"><img src="${logoSrc}" alt="${item.medio}"/></div>
          <span class="medio-name">${item.medio}</span>
        </div>
      </div>
    </div>`;
}

async function init() {
  let data;
  try {
    const res = await fetch(RAW_JSON);
    if (!res.ok) throw new Error("HTTP " + res.status);
    data = await res.json();
  } catch(e) {
    document.getElementById("dashboard").innerHTML = 
      '<p style="color:#c9a84c;padding:40px;text-align:center">Error al cargar el JSON: ' + e.message + '</p>';
    return;
  }

  data = data.map(item => ({
    ...item,
    gold: GOLD_KEYS.some(k => item.titulo_corto.toLowerCase().includes(k))
  }));

  const pillars = ["Equipo", "Rivales", "Logística", "Marcas", "Messi"];
  const dashboard = document.getElementById("dashboard");
  pillars.forEach(pilar => {
    const items = data.filter(d => d.pilar === pilar);
    const col = document.createElement("div");
    col.className = "column";
    col.innerHTML = `<div class="column-title">${pilar}</div>` + items.map(buildCard).join("");
    dashboard.appendChild(col);
  });
}

init();
</script>
