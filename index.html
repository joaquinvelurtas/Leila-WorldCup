<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard Mundial 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:             #080c18;
    --col-bg:         #0e1220;
    --card-bg:        #131829;
    --card-hover:     #181e30;
    --text-primary:   #eef0f8;
    --text-secondary: #7a819e;
    --text-muted:     #4a5170;
    --border:         #1e2438;
    --border-hover:   #2e3555;
    --arrow-color:    #3fb87a;
    --radius:         14px;
    --radius-sm:      10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    height: 100vh;
    overflow: hidden;
    color: var(--text-primary);
  }

  /* ── Slide system ─────────────────────────────────────────── */
  .slide {
    position: fixed;
    inset: 0;
    bottom: 50px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.8s ease;
    display: flex;
    flex-direction: column;
    padding: 24px 24px 0;
    background: var(--bg);
  }
  .slide.active { opacity: 1; pointer-events: all; }

  /* ── Dashboard grid ───────────────────────────────────────── */
  .dashboard {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    max-width: 1400px;
    width: 100%;
    margin: 0 auto;
    height: 100%;
  }

  .column {
    background: var(--col-bg);
    border-radius: var(--radius);
    padding: 18px 14px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    border: 1px solid var(--border);
    height: 100%;
    overflow: hidden;
  }
  .column-title {
    font-family: 'Syne', sans-serif;
    font-size: 17px;
    font-weight: 800;
    color: var(--text-primary);
    text-align: center;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
    letter-spacing: -0.2px;
    flex-shrink: 0;
    height: 2.8em;         /* fits exactly two lines at this font-size */
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1.25;
  }

  /* ── Card ─────────────────────────────────────────────────── */
  .card {
    background: var(--card-bg);
    border-radius: var(--radius-sm);
    padding: 15px 14px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    flex: 1;
    min-height: 0;
    border: 1px solid var(--border);
    transition: background 0.2s, border-color 0.2s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .card:hover { background: var(--card-hover); border-color: var(--border-hover); }

  .card.gold {
    background: linear-gradient(135deg, #1e1a0a 0%, #221e0d 40%, #1a1608 100%);
    border-color: #3a3010;
  }
  .card.gold:hover {
    background: linear-gradient(135deg, #252110 0%, #28230f 40%, #1e1a0a 100%);
    border-color: #4a3e18;
  }
  .card.gold::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 80px; height: 80px;
    background: radial-gradient(ellipse at top left, rgba(201,168,76,0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  .card-top { display: flex; flex-direction: column; gap: 8px; }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: 13.5px;
    font-weight: 700;
    line-height: 1.35;
    color: var(--text-primary);
    flex: 1;
  }
  .card.gold .card-title { color: #e8ca7a; }
  .arrow-wrap { flex-shrink: 0; margin-top: 1px; color: var(--arrow-color); }
  .card.gold .arrow-wrap { color: #c9a84c; }
  .card-summary {
    font-size: 11.5px;
    line-height: 1.55;
    color: var(--text-secondary);
    flex: 1;
    overflow: hidden;
  }
  .card-divider { height: 1px; background: var(--border); }
  .card.gold .card-divider { background: #3a3010; }
  .card-footer { display: flex; align-items: center; gap: 8px; }
  .medio-logo {
    width: 22px; height: 22px;
    border-radius: 4px; overflow: hidden;
    flex-shrink: 0; position: relative;
  }
/* ── Twitter card extras ──────────────────────────────────── */
  .x-logo-wrap {
    width: 22px; height: 22px;
    border-radius: 4px;
    background: #000;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: #fff;
  }
  .tweet-text {
    font-size: 11.5px;
    line-height: 1.5;
    color: var(--text-primary);
    font-weight: 500;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
  }
  .card.gold .tweet-text { color: #f0dfa0; }
  .tweet-desc {
    font-size: 11px;
    line-height: 1.5;
    color: var(--text-secondary);
    flex: 1;
    overflow: hidden;
  }
  .tweet-metrics {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 8px;
  }
  .metric {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 10.5px;
    font-weight: 600;
    color: var(--text-muted);
  }
  .metric svg { flex-shrink: 0; }
  .medio-logo img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; }
  .medio-logo .initials {
    display: none;
    position: absolute; inset: 0;
    align-items: center; justify-content: center;
    font-size: 7px; font-weight: 800; color: #fff;
    border-radius: 4px;
    letter-spacing: -0.3px;
  }
  .medio-name { font-size: 11px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.2px; }

  /* ── Slide 2: Twitter dashboard (same layout as slide-1) ── */
  #slide-2 {
    padding: 24px 24px 0;
  }

  /* ── Slide 3: two-column layout ──────────────────────────── */
  #slide-3 {
    padding: 20px 24px 0;
    flex-direction: row;
    gap: 14px;
  }

  /* Left half: bubble chart */
  .chart-shell {
    flex: 0 0 37.5%;
    max-width: 37.5%;
    overflow: hidden;
    min-width: 0;
    height: 100%;
    display: flex;
    flex-direction: column;
    background: var(--col-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 20px 14px;
    height: 100%;
  }

  .chart-body {
    flex: 1;
    min-height: 0;
    position: relative;
  }
  #bubbleCanvas { position: absolute; inset: 0; display: block; }

  /* Right half */
  .slide2-right {
    flex: 1;
    min-width: 0;
    height: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  /* Pulse panel cards */
  .pulse-card {
    background: var(--col-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
  }
  .pulse-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .pulse-title {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 800;
    color: var(--text-primary);
  }
  .pulse-subtitle {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 500;
  }
  /* Trending rows */
  .trend-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 0;
    border-bottom: 1px solid rgba(30,36,56,0.6);
  }
  .trend-row:last-child { border-bottom: none; }
  .trend-rank {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 800;
    color: var(--text-muted);
    width: 16px;
    flex-shrink: 0;
    text-align: center;
  }
  .trend-name {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-primary);
    flex: 1;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .trend-bar-wrap {
    width: 80px;
    height: 4px;
    background: rgba(30,36,56,0.8);
    border-radius: 2px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .trend-bar {
    height: 100%;
    border-radius: 2px;
  }
  .trend-vol {
    font-size: 11px;
    color: var(--text-secondary);
    width: 42px;
    text-align: right;
    flex-shrink: 0;
  }
  .trend-sentiment {
    width: 28px;
    height: 16px;
    border-radius: 3px;
    font-size: 9px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .sent-pos { background: rgba(63,184,122,0.18); color: #3fb87a; }
  .sent-neu { background: rgba(74,81,112,0.25); color: #7a819e; }
  .sent-neg { background: rgba(224,72,72,0.18); color: #e04848; }
  /* Sparkline row */
  .spark-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .spark-item {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px 8px;
  }
  .spark-label {
    font-size: 10px;
    color: var(--text-muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 4px;
  }
  .spark-value {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 800;
    color: var(--text-primary);
    line-height: 1;
    margin-bottom: 6px;
  }
  .spark-delta {
    font-size: 10px;
    font-weight: 600;
  }
  .delta-up   { color: #3fb87a; }
  .delta-down { color: #e04848; }
  .spark-canvas { width: 100%; height: 32px; display: block; }
  /* Wordcloud-style tag cloud */
  .tag-cloud {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    align-items: center;
  }
  .tag {
    border-radius: 4px;
    font-weight: 600;
    line-height: 1;
    padding: 4px 9px;
    cursor: default;
    transition: opacity 0.15s;
  }
  .tag:hover { opacity: 0.75; }

  /* ── Footer bar ───────────────────────────────────────────── */
  .bottom-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 50px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    z-index: 100;
  }
  .bottom-label {
    font-family: 'Syne', sans-serif;
    font-size: 13px; font-weight: 700;
    color: var(--text-muted);
  }
  .bottom-pill {
    background: var(--col-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 12.5px; font-weight: 600;
    color: var(--text-secondary);
    display: flex; align-items: center; gap: 7px;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #c9a84c; }
</style>
</head>
<body>

<!-- ── Slide 1: News dashboard ─────────────────────────────── -->
<div class="slide active" id="slide-1">
  <div class="dashboard" id="dashboard"></div>
</div>

<!-- ── Slide 2: Twitter dashboard ──────────────────────────── -->
<div class="slide" id="slide-2">
  <div class="dashboard" id="dashboard-twitter"></div>
</div>

<!-- ── Slide 3: Bubble chart ────────────────────────────────── -->
<div class="slide" id="slide-3">
  <div class="chart-shell">
    <div style="font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:var(--text-primary);margin-bottom:12px;flex-shrink:0;">X conversation</div>
    <div class="chart-body">
        <canvas id="bubbleCanvas"></canvas>
    </div>
  </div>
  <!-- Right half -->
  <div class="slide2-right" id="slide2-right"></div>
</div>

<!-- ── Footer ─────────────────────────────────────────────── -->
<div class="bottom-bar">
  <span class="bottom-label">Noticias Mundiales</span>
  <div class="bottom-pill"><span class="dot"></span>Mundial 2026</div>
  <span class="bottom-label" style="color:#c9a84c;">⚽ Dashboard</span>
</div>

<script>

const BASE             = "https://raw.githubusercontent.com/joaquinvelurtas/Leila-WorldCup/main/";
const RAW_JSON         = BASE + "posteos_mundial_2026_pilares.json";
const TWITTER_JSON     = BASE + "TWITTER_posteos_mundial_2026_pilares.json";
const BUBBLE_JSON      = BASE + "twitter_temas.json";
const GOLD_KEYS        = ["neymar", "hoteles", "nueva jersey"];
const PILLARS          = ["Equipo", "Humor", "Controversia", "Color en la tribuna", "Argentina por el mundo", "Alcohol"];
const SLIDE_INTERVAL_MS = 20000;

const LOGOS = {
  "La Nación": BASE + "lanacion.png",
  "Infobae":   BASE + "infobae.png",

const MEDIO_COLORS = {
  "La Nación": "#1a3a6e", "Infobae": "#ff6a00",
  "Página/12": "#111",    "TN":      "#e8002d"
};
const MEDIO_INITIALS = {
  "La Nación": "LN", "Infobae": "IB",
  "Página/12": "P12", "TN": "TN"
};

// ── Fallback data: news ───────────────────────────────────────
const DUMMY_NEWS = [
  { titulo_corto: "Julián y el objetivo histórico",      resumen: "Julián Álvarez habló sobre el objetivo de la Selección Argentina de cara al Mundial y se refirió a la posibilidad de que el equipo sea considerado uno de los mejores de la historia.", medio: "TN",      pilar: "Equipo"                  },
  { titulo_corto: "Jugadores llegan y avisan a Scaloni", resumen: "Varios futbolistas de la Selección llegaron al país en la recta final previa al Mundial y dejaron señales hacia Scaloni en medio de la definición del plantel.",                         medio: "TN",      pilar: "Equipo"                  },
  { titulo_corto: "Los memes de la convocatoria",        resumen: "La publicación de la lista mundialista desató una ola de memes en redes sociales. Los hinchas no dejaron pasar ningún detalle y los jugadores también reaccionaron.",                     medio: "Infobae", pilar: "Humor"                   },
  { titulo_corto: "El chiste que se volvió viral",       resumen: "Un posteo humorístico sobre los horarios de los partidos de Argentina en el Mundial se viralizó rápidamente y acumuló miles de interacciones en pocas horas.",                           medio: "TN",      pilar: "Humor"                   },
  { titulo_corto: "Polémica por la camiseta alternativa",resumen: "El diseño de la camiseta alternativa de la Selección generó controversia entre los hinchas. Mientras algunos la defienden, otros cuestionan la decisión de AFA.",                        medio: "La Nación",pilar: "Controversia"            },
  { titulo_corto: "Debate por el DT suplente",           resumen: "La falta de definición sobre el cuerpo técnico alternativo encendió el debate en los medios. Hay voces que piden más transparencia en las decisiones de conducción.",                    medio: "Infobae", pilar: "Controversia"            },
  { titulo_corto: "Argentinos copan Miami antes del Mundial", resumen: "Miles de hinchas argentinos ya están en Miami preparando el aguante para el Mundial. Banderas, canciones y un clima de fiesta anticipada inundaron la ciudad.",                    medio: "TN",      pilar: "Hinchada disruptiva"     },
  { titulo_corto: "El banderazo en el aeropuerto",       resumen: "Hinchas argentinos organizaron un banderazo espontáneo en el aeropuerto internacional de Miami al cruzarse con jugadores de la Selección. Las imágenes se viralizaron al instante.",      medio: "Infobae", pilar: "Hinchada disruptiva"     },
  { titulo_corto: "Hollywood se rinde ante Messi",       resumen: "Una estrella de Hollywood celebró la magia de Lionel Messi en su último partido con Inter Miami antes del Mundial, reforzando su impacto cultural en Estados Unidos.",                    medio: "Infobae", pilar: "Argentina por el mundo"  },
  { titulo_corto: "Nueva Jersey homenajea a Argentina",  resumen: "Una intersección de calles fue renombrada en honor a la Selección Argentina en plena previa mundialista, mostrando el impacto simbólico del equipo en una de las sedes del torneo.",      medio: "La Nación",pilar: "Argentina por el mundo"  }
];

// ── Fallback data: twitter bubble chart ──────────────────────
// Structure: { tema, likes, reposts, views, replies }
// "messi" in tema name → gold bubble (auto-detected, no extra flag)
const DUMMY_TWITTER_NEWS = [
  { Texto: "⚠️🇦🇷 LIONEL SCALONI ANUNCIARÁ MAÑANA LA LISTA DE CONVOCADOS DE ARGENTINA PARA EL MUNDIAL.", Descripción: "La conversación gira en torno a la impaciencia por conocer la lista definitiva. Los usuarios bromean con el estilo 'misterioso' de Scaloni y especulan sobre posibles inclusiones y exclusiones.", Autor: "@AtaqueFutbolero", Pilar: "Equipo",                  Likes: 7651, Reposts: 159, Replies: 68  },
  { Texto: "🤯🇦🇷 Argentina va a llevar MÁS DE 30 JUGADORES a la GIRA PREVIA DEL MUNDIAL para los amistosos ante Islandia y Honduras.", Descripción: "Críticas hacia Scaloni acusándolo de favorecer jugadores de Boca y River. Tono de desconfianza y enojo por supuestos 'negociados' en las convocatorias.", Autor: "@sudanalytics_",   Pilar: "Equipo",                  Likes: 3624, Reposts: 66,  Replies: 160 },
  { Texto: "🇦🇷🇩🇿 SEÑORAS Y SEÑORES HAY GOL DE ARGELIA: En Blender hicieron un ritual para que Argentina se quede afuera en fase de grupos del Mundial.", Descripción: "Conversación mayoritariamente burlona hacia los hinchas argelinos y el canal Blender. Predomina el humor irónico más que la ofensa.", Autor: "@derechazoar",     Pilar: "Humor/Memes",            Likes: 2326, Reposts: 103, Replies: 46  },
  { Texto: "Comienza el mundial y es un buen momento para recordar que cuando Argentina salió campeón en 2022, el litro de nafta salía 180 pesos y el kilo de asado 1200 pesos.", Descripción: "Tono nostálgico y comparativo. La conversación mezcla humor con desencanto por cómo cambió el país desde el título de 2022.", Autor: "@etupito",          Pilar: "Humor/Memes",            Likes: 522,  Reposts: 121, Replies: 37  },

  { Texto: "Todos se rien pero después del mundial la selección Argentina vs Cosobo va a despedir al Chiqui Tapia con la 10 en cancha...", Descripción: "Comentarios irónicos que coinciden en que Tapia debería irse. Consenso de rechazo hacia su figura y sensación de ciclo agotado.", Autor: "@GastonB777",       Pilar: "Controversia",           Likes: 88,   Reposts: 0,   Replies: 1   },
  { Texto: "No convoca a Barco y a Buendía para llevar a Masqueuncono y Low Celsius y el sábado cometo una locura", Descripción: "Faceta más enfadada de la hinchada. Frustración visible por las decisiones de Scaloni y tono disruptivo con enojo exagerado por inclusiones que consideran injustas.", Autor: "@pomberobaitata",   Pilar: "Color en la tribuna",    Likes: 315,  Reposts: 5,   Replies: 6   },
  { Texto: "La gente se ríe pero después del mundial la selección Argentina vs Cosobo va a despedir al Chiqui Tapia con la 10 en cancha...", Descripción: "Humor negro para canalizar el rechazo hacia la dirigencia de la AFA. Una parte de la hinchada ya da por terminado el ciclo de Tapia.", Autor: "@GastonB777",       Pilar: "Color en la tribuna",    Likes: 88,   Reposts: 0,   Replies: 1   },
  { Texto: "Vinicius eligió a la Selección Argentina entre las favoritas para el Mundial: 'Fueron los últimos campeones, tienen una gran confianza. Y tienen a Messi, que siempre aporta algo diferente.'", Descripción: "Orgullo y satisfacción por el reconocimiento internacional. Se destaca el respeto que genera Argentina y especialmente Messi fuera del país.", Autor: "@ModoScaloneta",    Pilar: "Argentina por el mundo", Likes: 241,  Reposts: 12,  Replies: 3   },
  { Texto: "Lionel Messi se une a la selección argentina para el Mundial, pero aún no está en plena forma. Scaloni confirma que varios jugadores sufren lesiones.", Descripción: "Preocupación moderada por el estado físico de Messi, pero confianza en que llegarán bien al torneo. Se discute el manejo de cargas previas al Mundial.", Autor: "@Goal_en_espanol",  Pilar: "Argentina por el mundo", Likes: 23,   Reposts: 2,   Replies: 1   }
];

// ── Arrow SVG ─────────────────────────────────────────────────
const arrowSVG = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none">
  <path d="M7 17L17 7M17 7H9M17 7V15" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>`;

// ── Build logo HTML (image + initials fallback) ───────────────
function buildLogoHTML(medio) {
  const src = LOGOS[medio] || "";
  const bg  = MEDIO_COLORS[medio]    || "#333";
  const ini = MEDIO_INITIALS[medio]  || medio.slice(0,2).toUpperCase();
  return `<div class="medio-logo">
    <img src="${src}" alt="${medio}"
         onload="this.style.display='block';this.parentElement.querySelector('.initials').style.display='none';"
         onerror="this.style.display='none';this.parentElement.querySelector('.initials').style.display='flex';"
         style="display:block"/>
    <div class="initials" style="background:${bg};">${ini}</div>
  </div>`;
}

// ── Build a news card ─────────────────────────────────────────
function buildCard(item) {
  const goldClass = item.gold ? " gold" : "";
  return `
    <div class="card${goldClass}">
      <div class="card-top">
        <div class="card-header">
          <div class="card-title">${item.titulo_corto}</div>

// ── Bubble chart renderer ─────────────────────────────────────
function renderBubbleChart(raw) {
  const data = raw.map(d => ({
    ...d,
    engagement: (d.likes || 0) + (d.reposts || 0),
    isMessi: d.tema.toLowerCase().includes("messi")
  }));

  const canvas = document.getElementById("bubbleCanvas");
  if (!canvas) return;

  const body  = canvas.parentElement;
  const DPR   = window.devicePixelRatio || 1;
  const W_CSS = body.clientWidth;
  const H_CSS = body.clientHeight;
  canvas.width  = W_CSS * DPR;
  canvas.height = H_CSS * DPR;
  canvas.style.width  = W_CSS + "px";
  canvas.style.height = H_CSS + "px";

  const ctx = canvas.getContext("2d");
  ctx.scale(DPR, DPR);

  const W = W_CSS, H = H_CSS;
  // Generous padding: left for y-axis line, bottom for x-axis line
  const PAD = { top: 20, right: 80, bottom: 36, left: 36 };
  const plotW = W - PAD.left - PAD.right;
  const plotH = H - PAD.top  - PAD.bottom;

  const maxEng     = Math.max(...data.map(d => d.engagement));
  const maxViews   = Math.max(...data.map(d => d.views));
  const maxReplies = Math.max(...data.map(d => d.replies));
  const minReplies = Math.min(...data.map(d => d.replies));

  // X axis extends to 150% of max engagement so bubbles never need clamping on right
  const axisMaxEng   = maxEng * 1.5;
  const axisMaxViews = maxViews * 1.15; // small top buffer too
  const scaleX = v => PAD.left + (Math.sqrt(v) / Math.sqrt(axisMaxEng))       * plotW;
  const scaleY = v => PAD.top  + (1 - Math.sqrt(v) / Math.sqrt(axisMaxViews)) * plotH;
  const scaleR = v => {
    const t = (v - minReplies) / (maxReplies - minReplies || 1);
    return 10 + t * 40; // 10px → 50px
  };

  // Only clamp for top/bottom/left edges — right is already padded by axisMaxEng
  const clampX = (cx, r) => Math.max(cx, PAD.left + r);
  const clampY = (cy, r) => Math.min(Math.max(cy, PAD.top + r), PAD.top + plotH - r);

  // ── Axis lines (dashed) ────────────────────────────────────
  const AXIS_COLOR = "rgba(90,105,148,0.7)";
  ctx.strokeStyle = AXIS_COLOR;
  ctx.lineWidth   = 1.5;
  ctx.setLineDash([5, 5]);
  // Y axis (left)
  ctx.beginPath();
  ctx.moveTo(PAD.left, PAD.top);
  ctx.lineTo(PAD.left, PAD.top + plotH);
  ctx.stroke();
  // X axis (bottom)
  ctx.beginPath();
  ctx.moveTo(PAD.left, PAD.top + plotH);
  ctx.lineTo(PAD.left + plotW, PAD.top + plotH);
  ctx.stroke();
  ctx.setLineDash([]);

  // ── Axis labels centered on each axis ─────────────────────
  ctx.fillStyle    = "rgba(238,240,248,0.75)";
  ctx.font         = `600 10px 'DM Sans', sans-serif`;
  ctx.textBaseline = "middle";

  // X label — centered below x-axis
  ctx.textAlign = "center";
  ctx.fillText("Engagement (likes + reposts)", PAD.left + plotW / 2, PAD.top + plotH + 20);

  // Y label — centered left of y-axis, rotated
  ctx.save();
  ctx.translate(PAD.left - 24, PAD.top + plotH / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.textAlign = "center";
  ctx.fillText("Views (total)", 0, 0);
  ctx.restore();

  // ── Bubbles ────────────────────────────────────────────────
  const sorted = [...data].sort((a, b) => +a.isMessi - +b.isMessi);

  sorted.forEach(d => {
    const r = scaleR(d.replies);
    const x = clampX(scaleX(d.engagement), r);
    const y = clampY(scaleY(d.views),      r);

    // Subtle left-to-right gradient
    const lg = ctx.createLinearGradient(x - r, y, x + r, y);
    if (d.isMessi) {
      lg.addColorStop(0, "rgba(215,178,70,0.88)");
      lg.addColorStop(1, "rgba(201,168,76,0.78)");
    } else {
      lg.addColorStop(0, "rgba(56,78,155,0.85)");
      lg.addColorStop(1, "rgba(42,62,130,0.75)");
    }
    ctx.fillStyle = lg;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = d.isMessi ? "rgba(201,168,76,0.5)" : "rgba(60,85,160,0.4)";
    ctx.lineWidth   = 1;
    ctx.stroke();
  });

  // ── Labels (second pass) ───────────────────────────────────
  sorted.forEach(d => {
    const r  = scaleR(d.replies);
    const x  = clampX(scaleX(d.engagement), r);
    const y  = clampY(scaleY(d.views),      r);
    const fs = Math.max(9, Math.min(12, r * 0.28));

    ctx.font         = `600 ${fs}px 'DM Sans', sans-serif`;
    ctx.textBaseline = "middle";
    const tw = ctx.measureText(d.tema).width;

    let lx, align;
    if (x + r + 6 + tw < PAD.left + plotW) {
      lx = x + r + 6; align = "left";
    } else if (x - r - 6 - tw > PAD.left) {
      lx = x - r - 6; align = "right";
    } else {
      lx = x; align = "center";
    }

    ctx.textAlign   = align;
    ctx.fillStyle   = d.isMessi ? "#e8ca7a" : "rgba(160,175,215,0.9)";
    ctx.shadowColor = "rgba(0,0,0,0.65)";
    ctx.shadowBlur  = 5;
    ctx.fillText(d.tema, lx, y);
    ctx.shadowBlur  = 0;
  });
}

function drawSparkline(canvas, vals, color) {
  const DPR  = window.devicePixelRatio || 1;
  const W    = canvas.offsetWidth  || 120;
  const H    = canvas.offsetHeight || 32;
  canvas.width  = W * DPR;
  canvas.height = H * DPR;
  const ctx  = canvas.getContext("2d");
  ctx.scale(DPR, DPR);
  const max  = Math.max(...vals);
  const min  = Math.min(...vals);
  const pad  = 3;
  const step = (W - pad * 2) / (vals.length - 1);
  ctx.beginPath();
  vals.forEach((v, i) => {
    const x = pad + i * step;
    const y = H - pad - ((v - min) / (max - min || 1)) * (H - pad * 2);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.strokeStyle = color;
  ctx.lineWidth   = 1.5;
  ctx.lineJoin    = "round";
  ctx.stroke();
}

function fmtVol(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1) + "M";
  if (n >= 1000)    return Math.round(n/1000) + "K";
  return String(n);
}
